<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Trainer Studio – Setup Guide</title>

  <!-- Markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #eef3f9;
      color: #243241;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    .panel {
      background: rgba(255,255,255,0.9);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(28,42,56,0.12);
    }
    a { color: #2d8fd5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel" id="content">Loading...</div>
  </div>

  <script>
    fetch('README.md')
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').innerText = 'Failed to load README.md';
        console.error(err);
      });
  </script>
</body>
</html>
