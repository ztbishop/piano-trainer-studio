<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Piano Trainer - Full Setup Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      background: #111;
      color: #eee;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1, h2, h3 {
      color: #fff;
      margin-top: 1.5em;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
    }

    pre {
      background: #222;
      padding: 12px;
      overflow-x: auto;
      border-radius: 6px;
    }

    a {
      color: #4da3ff;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 30px 0;
    }
  </style>
</head>

<body>
  <div class="container" id="content">
    Loading guide...
  </div>

  <script>
    fetch('README.md')
      .then(res => res.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p style="color:red;">Failed to load README.md</p>';
        console.error(err);
      });
  </script>
</body>
</html>
